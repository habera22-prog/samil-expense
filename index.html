<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>삼일교회 지출결의</title>
  <meta name="description" content="삼일교회 재정부 지출결의 시스템" />
  <meta name="theme-color" content="#4f7c53" />

  <!-- 카톡/공유 미리보기 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="삼일교회 지출결의" />
  <meta property="og:description" content="삼일교회 재정부 지출결의 시스템" />
  <meta property="og:image" content="https://habera22-prog.github.io/samil-expense/share.png" />

  <!-- 홈 화면 추가용 -->
  <link rel="apple-touch-icon" href="https://habera22-prog.github.io/samil-expense/icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="지출결의" />

  <style>
    :root {
      --card: rgba(255,255,255,0.95);
      --line: rgba(79,124,83,0.12);
      --text: #223122;
      --muted: #667266;
      --primary: #4f7c53;
      --primary-dark: #3f6643;
      --shadow: 0 14px 42px rgba(32, 48, 32, 0.10);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79,124,83,0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(79,124,83,0.06), transparent 30%),
        linear-gradient(180deg, #f7faf6 0%, #eef4ed 100%);
    }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 42px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px 22px 22px;
      animation: fadeUp .55s ease both;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      background: #ffffff;
      color: var(--primary-dark);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 82px;
      height: 82px;
      margin: 0 auto 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #edf5ec 100%);
      border: 1px solid rgba(79,124,83,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(79,124,83,0.08);
      overflow: hidden;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 42px);
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      appearance: none;
      border: 0;
      text-decoration: none;
      border-radius: 20px;
      padding: 18px 16px;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 22px rgba(79,124,83,0.20);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover {
      border-color: rgba(79,124,83,0.22);
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      .card {
        padding: 24px 16px 18px;
        border-radius: 24px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .btn {
        font-size: 17px;
        padding: 17px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="shell">
      <div class="card">
        <div class="top-badge">삼일교회 재정부</div>

        <div class="brand">
          <div class="brand-mark">
            <img src="logo.png" alt="삼일교회 로고" />
          </div>
          <h1>삼일교회 지출결의</h1>
          <p class="sub">지출결의 신청과 관리자 처리를 위한 온라인 시스템입니다.</p>
        </div>

        <div class="actions">
          <a
            class="btn btn-primary"
            href="https://script.google.com/macros/s/AKfycbwOI-s8uZ5BfASBSwhLPbsAVatzZO4sSvsTU8IFfbsLlqgcei2KJwmcZp38o1d_gbhC1w/exec"
            target="_blank"
            rel="noopener noreferrer"
          >신청 화면으로 이동</a>

          <a
            class="btn btn-secondary"
            href="https://script.google.com/macros/s/AKfycbykorKRQjyrb0s3BxmGdFkEW6s7CVHyoFnYsJoLgA3guJ6qH7MF5Z8EOZtKoKBWKbNA/exec"
            target="_blank"
            rel="noopener noreferrer"
          >관리자 화면으로 이동</a>
        </div>

        <div class="footer-note">
          원하시는 화면을 선택해 바로 이동해 주세요.
        </div>
      </div>
    </section>
  </main>
</body>
</html>
